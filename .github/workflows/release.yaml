name: Attach .deb release assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb for ${{ matrix.target_arch }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_arch: armv7
            deb_arch: armhf
          - target_arch: aarch64
            deb_arch: arm64
          - target_arch: i386
            deb_arch: i386
          - target_arch: amd64
            deb_arch: amd64

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            dpkg-dev \
            make

      - name: Derive and validate package metadata
        shell: bash
        run: |
          set -Eeuo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ -z "$version" || "$version" == "$tag" ]]; then
            printf 'Invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi

          if ! dpkg --validate-version "$version"; then
            printf 'Tag does not contain a valid Debian version: %s\n' \
              "$version" >&2
            exit 1
          fi

          repository_name="${GITHUB_REPOSITORY##*/}"
          package_name="$(
            printf '%s' "$repository_name" |
              tr '[:upper:]_' '[:lower:]-' |
              sed -E \
                's/[^a-z0-9+.-]+/-/g; s/^[^a-z0-9]+//; s/[^a-z0-9]+$//'
          )"

          if [[ -z "$package_name" ]] ||
            ! dpkg --validate-pkgname "$package_name"; then
            printf \
              'Cannot derive a valid Debian package name from repository: %s\n' \
              "$repository_name" >&2
            exit 1
          fi

          {
            printf 'RELEASE_TAG=%s\n' "$tag"
            printf 'PACKAGE_VERSION=%s\n' "$version"
            printf 'PACKAGE_NAME=%s\n' "$package_name"
            printf 'DEB_ARCH=%s\n' "${{ matrix.deb_arch }}"
          } >> "$GITHUB_ENV"

      - name: Build Debian package
        shell: bash
        run: |
          set -Eeuo pipefail

          package_root="${RUNNER_TEMP}/package-root-${DEB_ARCH}"
          output_dir="${GITHUB_WORKSPACE}/dist-${DEB_ARCH}"

          rm -rf "$package_root" "$output_dir"
          mkdir -p "$package_root/DEBIAN" "$output_dir"

          make clean
          make install DESTDIR="$package_root"

          if [[ ! -d "$package_root/usr/sbin" ]]; then
            printf 'Expected installation directory does not exist: %s\n' \
              "$package_root/usr/sbin" >&2
            exit 1
          fi

          mapfile -d '' installed_files < <(
            find "$package_root/usr/sbin" \
              -mindepth 1 \
              -maxdepth 1 \
              -type f \
              -print0
          )

          if [[ "${#installed_files[@]}" -eq 0 ]]; then
            printf 'No files were installed from scripts/.\n' >&2
            exit 1
          fi

          installed_size="$(
            du -sk "$package_root/usr" |
              awk '{print $1}'
          )"

          cat > "$package_root/DEBIAN/control" <<EOF
          Package: $PACKAGE_NAME
          Version: $PACKAGE_VERSION
          Section: utils
          Priority: optional
          Architecture: $DEB_ARCH
          Maintainer: GitHub Actions <noreply@github.com>
          Installed-Size: $installed_size
          Homepage: https://github.com/$GITHUB_REPOSITORY
          Description: Command-line scripts from $GITHUB_REPOSITORY
          EOF

          package="${output_dir}/${PACKAGE_NAME}_${PACKAGE_VERSION}_${DEB_ARCH}.deb"

          dpkg-deb \
            --root-owner-group \
            --build "$package_root" "$package"

      - name: Find and validate Debian package
        id: validate-package
        shell: bash
        run: |
          set -Eeuo pipefail

          output_dir="${GITHUB_WORKSPACE}/dist-${DEB_ARCH}"

          mapfile -d '' packages < <(
            find "$output_dir" \
              -maxdepth 1 \
              -type f \
              -name '*.deb' \
              -print0
          )

          if [[ "${#packages[@]}" -ne 1 ]]; then
            printf 'Expected exactly one %s .deb package, found %s\n' \
              "$DEB_ARCH" "${#packages[@]}" >&2
            printf '%s\n' "${packages[@]}" >&2
            exit 1
          fi

          package="${packages[0]}"
          package_architecture="$(
            dpkg-deb --field "$package" Architecture
          )"

          if [[ "$package_architecture" != "$DEB_ARCH" ]]; then
            printf 'Package architecture mismatch: expected %s, found %s\n' \
              "$DEB_ARCH" "$package_architecture" >&2
            exit 1
          fi

          expected_filename="${PACKAGE_NAME}_${PACKAGE_VERSION}_${DEB_ARCH}.deb"

          if [[ "$(basename "$package")" != "$expected_filename" ]]; then
            printf 'Unexpected package filename: %s\n' \
              "$(basename "$package")" >&2
            printf 'Expected package filename: %s\n' \
              "$expected_filename" >&2
            exit 1
          fi

          dpkg-deb --info "$package"
          dpkg-deb --contents "$package"

          printf 'package=%s\n' "$package" >> "$GITHUB_OUTPUT"

      - name: Store Debian package
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target_arch }}
          path: ${{ steps.validate-package.outputs.package }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release-deb:
    name: Create release and upload .deb packages
    runs-on: ubuntu-24.04
    needs:
      - build-deb

    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Install package validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            dpkg-dev

      - name: Download Debian packages
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: dist
          merge-multiple: true

      - name: Validate release packages
        id: validate-release
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -d '' packages < <(
            find "$GITHUB_WORKSPACE/dist" \
              -maxdepth 1 \
              -type f \
              -name '*.deb' \
              -print0
          )

          if [[ "${#packages[@]}" -ne 4 ]]; then
            printf 'Expected exactly four .deb packages, found %s\n' \
              "${#packages[@]}" >&2
            printf '%s\n' "${packages[@]}" >&2
            exit 1
          fi

          declare -A discovered_architectures=()

          for package in "${packages[@]}"; do
            dpkg-deb --info "$package" >/dev/null

            architecture="$(
              dpkg-deb --field "$package" Architecture
            )"

            case "$architecture" in
              amd64 | arm64 | armhf | i386)
                ;;
              *)
                printf 'Unexpected Debian architecture %s in package %s\n' \
                  "$architecture" "$package" >&2
                exit 1
                ;;
            esac

            if [[ -n "${discovered_architectures[$architecture]:-}" ]]; then
              printf 'Duplicate package for architecture: %s\n' \
                "$architecture" >&2
              exit 1
            fi

            discovered_architectures["$architecture"]=1

            if [[ "$(basename "$package")" != *"_${architecture}.deb" ]]; then
              printf \
                'Package filename does not match its architecture: %s\n' \
                "$package" >&2
              exit 1
            fi

            printf 'Validated %s package: %s\n' \
              "$architecture" "$(basename "$package")"

            dpkg-deb --contents "$package"
          done

          for required_architecture in amd64 arm64 armhf i386; do
            if [[ -z \
              "${discovered_architectures[$required_architecture]:-}" ]]; then
              printf 'Missing package for architecture: %s\n' \
                "$required_architecture" >&2
              exit 1
            fi
          done

          {
            printf 'packages<<EOF\n'
            printf '%s\n' "${packages[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail

          if ! gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi

      - name: Upload Debian packages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -d '' packages < <(
            find "$GITHUB_WORKSPACE/dist" \
              -maxdepth 1 \
              -type f \
              -name '*.deb' \
              -print0
          )

          gh release upload "$RELEASE_TAG" \
            "${packages[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
